name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    name: Lint, test, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Install dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Download spaCy model (anonymization NER)
        run: python -m spacy download en_core_web_sm

      # 2. Run linting
      - name: Lint with Black (check only, no reformatting)
        run: black --check --diff screener webapp scripts tests

      - name: Lint with Flake8
        run: flake8 screener webapp scripts tests

      # 3. Run tests
      # 4. Generate coverage report
      # (one pytest invocation both runs the suite and writes coverage data —
      # see pytest.ini/.coveragerc; the second step below reports on that same
      # data rather than re-running the suite a second time.)
      - name: Run tests
        env:
          FLASK_SECRET_KEY: ci-test-secret-key-not-for-production
        run: pytest

      - name: Generate coverage report
        run: coverage report

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # 5. Build Docker image
  # Gated on lint-and-test passing — a broken build never gets an image, and
  # a failing test/lint step fails the whole pipeline (GitHub Actions default:
  # a job that `needs` a failed job is skipped, which shows as a failed pipeline).
  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed — validates the Dockerfile builds cleanly)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: resume-screener:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
