{% extends "base.html" %}
{% block title %}Admin login{% endblock %}
{% block content %}
  <div class="hero">
    <h1>Admin login</h1>
    <p>Sign in to manage candidates, jobs, and rankings.</p>
  </div>
  <div class="panel">
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autofocus required
             style="width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:14.5px;font-family:inherit;">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required
             style="width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:14.5px;font-family:inherit;">
      <button type="submit">Log in</button>
    </form>
  </div>
  <p style="text-align:center;margin-top:24px;">
    <a href="{{ url_for('index') }}" style="color:var(--accent);text-decoration:none;font-weight:600;">&larr; Back to application form</a>
  </p>
{% endblock %}
